<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Turbo - Car Rental</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; scroll-behavior: smooth; background-color: #f9fafb; }
        h1, h2, h3, .oswald { font-family: 'Oswald', sans-serif; }
        
        .hero-bg {
            background-color: #111827;
            background-image: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%), 
                              url('https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&q=80&w=2070'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        header.scrolled {
            background-color: #111827 !important;
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            z-index: 100;
        }

        .calendar-modal {
            display: none;
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) !important;
            z-index: 9999 !important;
            width: 310px;
            box-shadow: 0 0 0 100vmax rgba(0,0,0,0.6), 0 25px 50px -12px rgba(0,0,0,0.25) !important;
        }
        
        .calendar-day.selected {
            background-color: #f59e0b !important;
            color: white !important;
            border-radius: 50%;
        }
        .calendar-day.in-range {
            background-color: #fef3c7;
            color: #92400e;
        }
        .calendar-day.disabled {
            color: #d1d5db;
            cursor: not-allowed;
            pointer-events: none;
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .whatsapp-float { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                brand: { orange: '#f59e0b', dark: '#111827', yellow: '#fbbf24' }
              }
            }
          }
        }
    </script>
</head>
<body class="antialiased text-gray-800">

    <div id="app">
        <header class="fixed w-full z-[100] py-6 px-8 flex items-center justify-between text-white transition-all duration-500" id="mainHeader">
            <a class="text-3xl font-bold tracking-wider flex items-center gap-1 oswald cursor-pointer select-none" onclick="goHome()">
                TURB<span class="bg-brand-orange text-white px-2 py-0.5 rounded" ondblclick="openAdmin(); event.stopPropagation();" title="Doble clic para Admin">O</span>
            </a>
            <nav class="hidden md:flex space-x-8 uppercase text-sm tracking-wide font-medium">
                <a class="hover:text-brand-orange transition-colors text-white cursor-pointer" onclick="goHome()">Inicio</a>
                <a class="hover:text-brand-orange transition-colors text-white cursor-pointer" onclick="scrollToFleet()">Flota</a>
                <a class="hover:text-brand-orange transition-colors text-white cursor-pointer" href="#section-banners">Por qué elegirnos</a>
            </nav>
            <button onclick="showNotif('Sección de cuenta próximamente')" class="bg-white/10 hover:bg-white/20 px-5 py-2 rounded-full text-xs font-bold backdrop-blur-md transition-all border border-white/20 uppercase tracking-widest">Mi Cuenta</button>
        </header>

        <div id="main-view">
            <section id="hero" class="min-h-screen flex flex-col hero-bg">
                <main class="flex-grow flex flex-col justify-center items-start px-8 md:px-16 lg:px-24 pt-36">
                    <div class="max-w-xl md:max-w-2xl fade-in text-left text-white">
                        <h1 class="text-5xl md:text-7xl font-bold uppercase leading-tight mb-4 tracking-wide oswald">
                            Make Your Ride Easy & Fast With Turbo
                        </h1>
                        <p class="text-lg md:text-xl text-gray-200 mb-10 max-w-md">
                            Explora Guatemala con estilo. Tu vehículo ideal te espera para la próxima aventura.
                        </p>
                    </div>

                    <div class="bg-white rounded-lg p-8 shadow-2xl w-full max-w-2xl fade-in relative mb-10 calendar-wrapper">
                        <form class="grid grid-cols-1 md:grid-cols-2 gap-6" onsubmit="handleSearch(event)">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Punto de Recogida</label>
                                <select id="searchLocation" class="block w-full border-gray-100 rounded py-3 text-sm bg-gray-50 font-bold">
                                    <option value="">Seleccionar ubicación</option>
                                    <option value="Panajachel, Sololá">Panajachel, Sololá</option>
                                    <option value="Aeropuerto La Aurora, GT">Aeropuerto La Aurora, GT</option>
                                    <option value="Antigua Guatemala">Antigua Guatemala</option>
                                </select>
                            </div>
                            <div class="relative">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Fechas de Viaje</label>
                                <input id="dateInput" type="text" class="block w-full border-gray-100 rounded py-3 text-sm cursor-pointer bg-gray-50 font-bold" value="Seleccionar fechas" readonly onclick="toggleCalendar(event, 'homeCalendarModal')">
                                
                                <div id="homeCalendarModal" class="calendar-modal bg-white rounded-xl border p-5 fade-in">
                                    <div class="flex gap-2 mb-4 text-center">
                                        <div class="flex-1 bg-gray-50 p-2 rounded border"><p class="text-[9px] font-bold text-gray-400">Entrega</p><p id="startDateDisplay" class="text-xs font-bold">--/--/--</p></div>
                                        <div class="flex-1 bg-gray-50 p-2 rounded border"><p class="text-[9px] font-bold text-gray-400">Devolución</p><p id="endDateDisplay" class="text-xs font-bold">--/--/--</p></div>
                                    </div>
                                    <div class="flex justify-between items-center mb-4">
                                        <button type="button" onclick="changeMonth(event, -1, 'homeCalendar')"><i class="fa-solid fa-chevron-left"></i></button>
                                        <h4 id="homeCalendarMonthTitle" class="text-sm font-bold uppercase oswald">Abril 2026</h4>
                                        <button type="button" onclick="changeMonth(event, 1, 'homeCalendar')"><i class="fa-solid fa-chevron-right"></i></button>
                                    </div>
                                    <div class="grid grid-cols-7 gap-y-1" id="homeCalendarGrid"></div>
                                    <div class="mt-4 flex justify-end gap-2 border-t pt-4">
                                        <button type="button" onclick="clearDates(event)" class="text-[10px] font-bold text-gray-400 uppercase">Limpiar</button>
                                        <button type="button" onclick="applyDates(event, 'homeCalendarModal')" class="bg-brand-dark text-white text-[10px] font-bold px-4 py-2 rounded">Confirmar</button>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="md:col-span-2 w-full bg-brand-orange text-white font-bold py-4 rounded shadow-lg uppercase tracking-wider text-sm">Buscar Vehículo</button>
                        </form>
                    </div>
                </main>
            </section>

            <section id="section-fleet" class="py-20 bg-gray-100 px-8 md:px-16 lg:px-24 border-t border-gray-200">
                <div class="flex justify-between items-end mb-10">
                    <h2 class="oswald text-4xl uppercase font-bold tracking-tight text-gray-900">Nuestra Flota</h2>
                    <p id="fleet-count" class="text-gray-500 text-sm font-medium">Cargando...</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="car-grid"></div>
            </section>
        </div>

        <section id="page-detail" class="hidden pt-32 pb-20 px-8 md:px-16 lg:px-24 fade-in min-h-screen bg-gray-50">
            <button onclick="closeDetail()" class="mb-8 flex items-center gap-2 text-gray-500 hover:text-gray-900 font-bold text-xs uppercase transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Regresar a la flota
            </button>
            <div id="detail-content"></div>
        </section>

        <section id="admin-view" class="hidden pt-32 pb-20 px-8 md:px-16 lg:px-24 fade-in min-h-screen bg-gray-50">
            <button onclick="goHome()" class="mb-8 flex items-center gap-2 text-gray-500 hover:text-gray-900 font-bold text-xs uppercase">
                <i class="fa-solid fa-arrow-left"></i> Salir de Admin
            </button>
            <div class="max-w-4xl mx-auto">
                <h2 class="oswald text-4xl font-bold mb-8 uppercase">Gestión de Flota</h2>
                
                <div class="bg-white p-8 rounded-xl border mb-12 shadow-sm">
                    <h3 class="font-bold uppercase text-xs tracking-widest mb-4 border-b pb-2">Agregar Carro</h3>
                    <form id="adminForm" onsubmit="addCar(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input id="adminCarName" type="text" required class="border-gray-200 rounded py-3 text-sm bg-gray-50" placeholder="Nombre (Ej. Toyota Hilux)">
                        <input id="adminCarPrice" type="number" required class="border-gray-200 rounded py-3 text-sm bg-gray-50" placeholder="Precio x Día">
                        <input id="adminCarType" type="text" required class="border-gray-200 rounded py-3 text-sm bg-gray-50" placeholder="Tipo (SUV, Sedán)">
                        <input id="adminCarImages" type="text" required class="border-gray-200 rounded py-3 text-sm bg-gray-50" placeholder="URL imagen (directo .jpg)">
                        <button type="submit" class="md:col-span-2 bg-brand-dark text-white font-bold py-3 rounded uppercase text-xs">Guardar en Base de Datos</button>
                    </form>
                </div>

                <div class="bg-white p-8 rounded-xl border shadow-sm">
                    <h3 class="font-bold uppercase text-xs tracking-widest mb-6 border-b pb-2">Inventario</h3>
                    <div id="admin-car-list" class="space-y-4"></div>
                </div>
            </div>
        </section>
    </div>

    <div id="notif" class="fixed bottom-10 right-10 bg-gray-900 text-white p-5 rounded-lg shadow-2xl translate-y-40 transition-transform duration-300 z-[200] border-l-4 border-brand-orange">
        <p id="notif-text" class="text-sm font-bold"></p>
    </div>

    <a href="https://wa.me/50200000000" target="_blank" class="whatsapp-float fixed bottom-8 left-8 bg-green-500 text-white p-4 rounded-full shadow-2xl z-[150] flex items-center justify-center">
        <i class="fa-brands fa-whatsapp text-3xl"></i>
    </a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // CONFIGURACIÓN EXACTA DE TU FIREBASE
        // ==========================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyDN5m6y0D06qmjxC5aJgTIJgFqWTrkWM3g",
            authDomain: "mycar-532b2.firebaseapp.com",
            projectId: "mycar-532b2",
            storageBucket: "mycar-532b2.firebasestorage.app",
            messagingSenderId: "999070913490",
            appId: "1:999070913490:web:0f79b5cc64c4f429fe2e0b"
        };

        let db, auth;
        const currentAppId = typeof __app_id !== 'undefined' ? __app_id : 'mycar-532b2';

        // --- ESTADO GLOBAL ---
        window.CARS = [];
        window.startDay = null;
        window.endDay = null;
        window.selectedCar = null;
        window.currentMonth = 3; 
        window.currentYear = 2026;
        window.monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

        // --- FUNCIONES UI ---
        window.showNotif = (msg) => {
            const n = document.getElementById('notif');
            if (n) {
                n.querySelector('p').innerText = msg;
                n.classList.remove('translate-y-40');
                setTimeout(() => n.classList.add('translate-y-40'), 4000);
            }
        };

        window.goHome = () => {
            document.getElementById('page-detail').classList.add('hidden');
            document.getElementById('admin-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            window.scrollTo(0, 0);
            window.updateHeaderOnScroll();
        };

        window.openAdmin = () => {
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('admin-view').classList.remove('hidden');
            window.scrollTo(0, 0);
            window.renderAdminCars();
        };
        
        window.closeDetail = window.goHome;

        window.scrollToFleet = () => {
            const el = document.getElementById('section-fleet');
            if (el) el.scrollIntoView({ behavior: 'smooth' });
        };

        window.updateHeaderOnScroll = () => {
            const h = document.getElementById('mainHeader');
            if (!h) return;
            const isMain = !document.getElementById('main-view').classList.contains('hidden');
            if (isMain && window.scrollY > 50) h.classList.add('scrolled');
            else if (!isMain) h.classList.add('scrolled');
            else h.classList.remove('scrolled');
        };

        // --- LÓGICA DE DATOS ---
        window.renderCars = (list = window.CARS) => {
            const grid = document.getElementById('car-grid');
            if(!grid) return;
            const countEl = document.getElementById('fleet-count');
            if (countEl) countEl.innerText = `${list.length} disponibles`;
            
            grid.innerHTML = list.map(car => `
                <div class="bg-white rounded-lg overflow-hidden border shadow-sm cursor-pointer group" onclick="openDetail('${car.id}')">
                    <div class="h-48 overflow-hidden">
                        <img src="${car.images[0]}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div>
                    <div class="p-6">
                        <span class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">${car.type}</span>
                        <h3 class="oswald text-xl font-bold uppercase text-gray-900">${car.name}</h3>
                        <p class="text-gray-900 font-bold mt-4">Q${car.price.toLocaleString()} <span class="text-[10px] text-gray-400">/ DÍA</span></p>
                    </div>
                </div>
            `).join('');
        };

        window.openDetail = (id) => {
            window.selectedCar = window.CARS.find(c => c.id === id);
            if (!window.selectedCar) return;

            const format = (d) => d ? `${d.d}/${d.m + 1}` : "--/--";
            const dateText = window.startDay && window.endDay ? `${format(window.startDay)} - ${format(window.endDay)}` : "Seleccionar fechas";

            document.getElementById('detail-content').innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="lg:col-span-2">
                        <img src="${window.selectedCar.images[0]}" class="w-full h-[450px] object-cover rounded-xl border shadow-sm">
                    </div>
                    <div class="bg-white p-8 rounded-xl border shadow-xl">
                        <h1 class="oswald text-3xl font-bold uppercase mb-4">${window.selectedCar.name}</h1>
                        <p class="text-3xl font-bold mb-6 text-brand-orange">Q${window.selectedCar.price}</p>
                        <div id="booking-step-1" class="space-y-4">
                            <input type="text" id="detailDateInput" class="w-full rounded border-gray-200 py-3 bg-gray-50 font-bold cursor-pointer" value="${dateText}" readonly onclick="toggleCalendar(event, 'detailCalendarModal')">
                            <div id="detailCalendarModal" class="calendar-modal bg-white rounded-xl border p-5">
                                <div class="grid grid-cols-7 gap-y-1" id="detailCalendarGrid"></div>
                                <button onclick="applyDates(event, 'detailCalendarModal')" class="w-full mt-4 bg-brand-dark text-white py-2 rounded">Aceptar</button>
                            </div>
                            <button onclick="validateAndProceed()" class="w-full bg-brand-orange text-white font-bold py-4 rounded uppercase">Continuar Reserva</button>
                        </div>
                        <div id="booking-step-2" class="hidden space-y-4 fade-in">
                            <input id="clientName" type="text" class="w-full rounded border-gray-200 py-3 text-sm" placeholder="Nombre completo">
                            <input id="clientPhone" type="tel" class="w-full rounded border-gray-200 py-3 text-sm" placeholder="WhatsApp">
                            <button onclick="submitBooking(event)" class="w-full bg-brand-dark text-white font-bold py-4 rounded uppercase">Enviar por WhatsApp</button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('page-detail').classList.remove('hidden');
            window.scrollTo(0, 0);
            window.updateHeaderOnScroll();
            window.generateCalendar('detailCalendarGrid');
        };

        window.handleSearch = (e) => {
            if (e) e.preventDefault();
            window.renderCars(window.getAvailableCars());
            window.scrollToFleet();
        };

        window.submitBooking = (e) => {
            if (e) e.preventDefault();
            const n = document.getElementById('clientName').value;
            const p = document.getElementById('clientPhone').value;
            if(!n || !p) return window.showNotif("Llená tus datos maje");
            
            const fmt = (d) => `${d.d}/${d.m + 1}/${d.y}`;
            const msg = `Reserva: ${window.selectedCar.name}\nDesde: ${fmt(window.startDay)}\nHasta: ${fmt(window.endDay)}\nCliente: ${n}`;
            window.open(`https://wa.me/50200000000?text=${encodeURIComponent(msg)}`, '_blank');
        };

        window.validateAndProceed = () => {
            if(!window.startDay || !window.endDay) return window.showNotif("Elegí fechas primero");
            document.getElementById('booking-step-1').classList.add('hidden');
            document.getElementById('booking-step-2').classList.remove('hidden');
        };

        // --- CALENDARIO ---
        window.generateCalendar = (gridId) => {
            const grid = document.getElementById(gridId);
            if(!grid) return;
            grid.innerHTML = '';
            const daysInMonth = new Date(window.currentYear, window.currentMonth + 1, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                day.className = 'calendar-day py-2 text-[12px] font-bold cursor-pointer text-center rounded-full hover:bg-gray-100';
                day.innerText = i;
                
                if (window.startDay && window.startDay.d === i && window.startDay.m === window.currentMonth) day.classList.add('selected');
                if (window.endDay && window.endDay.d === i && window.endDay.m === window.currentMonth) day.classList.add('selected');
                
                if (window.startDay && window.endDay) {
                    const current = new Date(window.currentYear, window.currentMonth, i).getTime();
                    const s = new Date(window.startDay.y, window.startDay.m, window.startDay.d).getTime();
                    const e = new Date(window.endDay.y, window.endDay.m, window.endDay.d).getTime();
                    if (current > s && current < e) day.classList.add('in-range');
                }

                day.onclick = (e) => {
                    e.stopPropagation();
                    const clicked = { d: i, m: window.currentMonth, y: window.currentYear };
                    const clickedTime = new Date(clicked.y, clicked.m, clicked.d).getTime();
                    
                    if (!window.startDay || (window.startDay && window.endDay)) {
                        window.startDay = clicked; window.endDay = null;
                    } else {
                        const startTime = new Date(window.startDay.y, window.startDay.m, window.startDay.d).getTime();
                        if (clickedTime > startTime) window.endDay = clicked;
                        else { window.startDay = clicked; window.endDay = null; }
                    }
                    window.updateAllDateDisplays();
                    document.querySelectorAll('[id$="Grid"]').forEach(g => window.generateCalendar(g.id));
                };
                grid.appendChild(day);
            }
        };

        window.changeMonth = (e, delta, prefix) => {
            if (e) e.stopPropagation();
            window.currentMonth += delta;
            if (window.currentMonth > 11) { window.currentMonth = 0; window.currentYear++; }
            if (window.currentMonth < 0) { window.currentMonth = 11; window.currentYear--; }
            const el = document.getElementById(prefix + 'MonthTitle');
            if (el) el.innerText = `${window.monthNames[window.currentMonth]} ${window.currentYear}`;
            window.generateCalendar(prefix + 'Grid');
        };

        window.toggleCalendar = (e, id) => { 
            if (e) e.stopPropagation(); 
            const m = document.getElementById(id); 
            if (!m) return;
            const isVisible = m.style.display === 'block';
            m.style.display = isVisible ? 'none' : 'block'; 
            if (!isVisible) window.generateCalendar(id.replace('Modal', 'Grid')); 
        };

        window.applyDates = (e, id) => { 
            if (e) e.stopPropagation(); 
            const m = document.getElementById(id);
            if (m) m.style.display = 'none'; 
        };

        window.clearDates = (e) => { 
            if (e) e.stopPropagation(); 
            window.startDay = null; 
            window.endDay = null; 
            window.updateAllDateDisplays(); 
            document.querySelectorAll('[id$="Grid"]').forEach(g => window.generateCalendar(g.id)); 
        };

        window.updateAllDateDisplays = () => {
            const fmt = (d) => d ? `${d.d}/${d.m + 1}` : "";
            const txt = window.startDay && window.endDay ? `${fmt(window.startDay)} - ${fmt(window.endDay)}` : "Seleccionar fechas";
            const inputHome = document.getElementById('dateInput');
            const inputDetail = document.getElementById('detailDateInput');
            if(inputHome) inputHome.value = txt;
            if(inputDetail) inputDetail.value = txt;
        };

        // --- ADMIN ---
        window.renderAdminCars = () => {
            const list = document.getElementById('admin-car-list');
            if (!list) return;
            list.innerHTML = window.CARS.map(car => `
                <div class="flex items-center justify-between p-4 border rounded bg-gray-50">
                    <div class="flex items-center gap-3">
                        <img src="${car.images[0]}" class="w-12 h-10 object-cover rounded">
                        <p class="font-bold text-sm text-gray-900">${car.name}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="deleteCar('${car.id}')" class="text-red-500 text-xs font-bold uppercase">Borrar</button>
                    </div>
                </div>
            `).join('');
        };

        window.addCar = async (e) => {
            if (e) e.preventDefault();
            const n = document.getElementById('adminCarName').value;
            const p = Number(document.getElementById('adminCarPrice').value);
            const img = document.getElementById('adminCarImages').value;
            const t = document.getElementById('adminCarType').value;
            
            try {
                const carsRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'cars');
                await addDoc(carsRef, { name: n, price: p, images: [img], type: t, bookedRanges: [] });
                window.showNotif('¡Carro agregado exitosamente!'); 
                document.getElementById('adminForm').reset();
            } catch(err) {
                console.error(err);
                window.showNotif("Error al guardar en Firebase");
            }
        };

        window.deleteCar = async (id) => {
            if(confirm('¿Seguro que querés borrar este carro?')) {
                try {
                    await deleteDoc(doc(db, 'artifacts', currentAppId, 'public', 'data', 'cars', id));
                    window.showNotif('Carro eliminado');
                } catch(err) { console.error(err); }
            }
        };

        // --- FALLBACK ---
        function getLocalFallbackCars() { 
            return [
                { id: '1', name: 'Carro de Prueba', price: 500, type: 'SUV', bookedRanges: [], images: ['https://images.unsplash.com/photo-1594502184342-2e12f877aa73?auto=format&fit=crop&q=80&w=800'] }
            ]; 
        }

        window.getAvailableCars = () => {
            if (!window.startDay || !window.endDay) return window.CARS;
            return window.CARS.filter(car => {
                const booked = car.bookedRanges || [];
                return !booked.some(range => {
                    const s = window.startDay.d;
                    const e = window.endDay.d;
                    return (s <= range.end && e >= range.start);
                });
            });
        };

        // --- INIT APP ---
        function listenToCars() {
            const carsRef = collection(db, 'artifacts', currentAppId, 'public', 'data', 'cars');
            onSnapshot(carsRef, (snap) => {
                if (snap.empty) {
                    window.CARS = [];
                } else {
                    window.CARS = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                }
                window.renderCars();
                if(!document.getElementById('admin-view').classList.contains('hidden')) window.renderAdminCars();
            }, (err) => {
                console.warn("Firestore Error:", err);
                window.CARS = getLocalFallbackCars();
                window.renderCars();
            });
        }

        async function initApp() {
            try {
                // Prioriza la configuración generada en el código local
                const appInstance = initializeApp(myFirebaseConfig);
                auth = getAuth(appInstance);
                db = getFirestore(appInstance);

                // Autenticación anónima por defecto para Firebase de usuario
                await signInAnonymously(auth);

                onAuthStateChanged(auth, (u) => {
                    if (u) listenToCars();
                    else {
                        window.CARS = getLocalFallbackCars();
                        window.renderCars();
                    }
                });

            } catch(err) {
                console.error("Firebase Init Error:", err);
                window.CARS = getLocalFallbackCars();
                window.renderCars();
            }
        }

        // --- SETUP ---
        window.addEventListener('scroll', window.updateHeaderOnScroll);
        window.onload = () => { 
            window.updateHeaderOnScroll(); 
            window.generateCalendar('homeCalendarGrid'); 
            initApp();
        };
        
        // Cierre de modales al hacer clic fuera
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.calendar-wrapper')) {
                document.querySelectorAll('.calendar-modal').forEach(m => m.style.display = 'none');
            }
        });
    </script>
</body>
</html>
